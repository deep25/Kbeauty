<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="K-Beauty Picks — Honest Amazon Finds">
<meta property="og:description" content="My personal K-beauty recommendations. Every product ships from Amazon.">
<title>K-Beauty Picks ✨</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafaf9;color:#1a1a1a;min-height:100vh}
  .store{max-width:500px;margin:0 auto;padding:0 0 2rem}
  .header{text-align:center;padding:2rem 1rem 1.25rem;background:#fff;border-bottom:1px solid #f0ede8}
  .logo{width:52px;height:52px;border-radius:50%;background:#fce7f3;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:24px}
  .store-name{font-size:22px;font-weight:600;margin-bottom:6px;color:#1a1a1a}
  .store-bio{font-size:14px;color:#666;line-height:1.6;max-width:320px;margin:0 auto}
  .filters{display:flex;gap:6px;padding:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff;border-bottom:1px solid #f0ede8;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .fbtn{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid #e0ddd8;background:#fff;cursor:pointer;color:#666;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
  .fbtn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .products{padding:1rem;display:flex;flex-direction:column;gap:10px}
  .card{background:#fff;border:1px solid #f0ede8;border-radius:16px;padding:1rem;display:flex;gap:12px;align-items:flex-start}
  .card-emoji{width:68px;height:68px;border-radius:12px;background:#faf9f7;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
  .card-body{flex:1;min-width:0}
  .badges{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
  .badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
  .b-hot{background:#fef2f2;color:#dc2626}
  .b-viral{background:#fffbeb;color:#d97706}
  .b-fave{background:#f0fdf4;color:#16a34a}
  .b-blue{background:#eff6ff;color:#2563eb}
  .card-name{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:2px;line-height:1.3}
  .card-brand{font-size:11px;color:#999;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em}
  .card-desc{font-size:12px;color:#666;line-height:1.55;margin-bottom:10px}
  .card-footer{display:flex;align-items:center;justify-content:space-between}
  .price{font-size:14px;font-weight:600;color:#1a1a1a}
  .buy{font-size:12px;padding:7px 16px;border-radius:20px;background:#1a1a1a;color:#fff;border:none;cursor:pointer;text-decoration:none;display:inline-block;font-weight:500;transition:opacity 0.15s}
  .buy:hover{opacity:0.8}
  .share-box{margin:0 1rem;background:#fff;border:1px solid #f0ede8;border-radius:16px;padding:1.25rem;text-align:center}
  .share-title{font-size:14px;font-weight:600;margin-bottom:4px}
  .share-sub{font-size:12px;color:#666;margin-bottom:14px}
  .share-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .sbtn{font-size:12px;padding:8px 18px;border-radius:20px;border:1px solid #e0ddd8;background:#fff;cursor:pointer;color:#444;font-weight:500;transition:background 0.15s}
  .sbtn:hover{background:#f5f4f1}
  .sbtn.green{background:#25d366;color:#fff;border-color:#25d366}
  .sbtn.green:hover{opacity:0.9}
  .disclaimer{text-align:center;font-size:11px;color:#bbb;margin:1.25rem 1rem 0;line-height:1.5}
  .empty{text-align:center;padding:2rem;color:#999;font-size:14px}
</style>
</head>
<body>

<div class="store">
  <div class="header">
    <div class="logo">✨</div>
    <div class="store-name">K-Beauty Picks</div>
    <div class="store-bio">Honest Korean skincare picks — all tested, all on Amazon Prime. Updated with whatever is actually trending.</div>
  </div>

  <div class="filters" id="filters">
    <button class="fbtn active" onclick="filter('all',this)">All picks</button>
    <button class="fbtn" onclick="filter('viral',this)">Viral now 🔥</button>
    <button class="fbtn" onclick="filter('skincare',this)">Skincare</button>
    <button class="fbtn" onclick="filter('spf',this)">SPF</button>
    <button class="fbtn" onclick="filter('device',this)">Devices</button>
    <button class="fbtn" onclick="filter('under20',this)">Under $20</button>
  </div>

  <div class="products" id="products"></div>

  <div class="share-box">
    <div class="share-title">Know someone into K-beauty?</div>
    <div class="share-sub">Share this page — everything ships from Amazon</div>
    <div class="share-btns">
      <button class="sbtn green" onclick="wa()">Share on WhatsApp</button>
      <button class="sbtn" onclick="copyLink(this)">Copy link</button>
    </div>
  </div>

  <div class="disclaimer">
    As an Amazon Associate I earn from qualifying purchases at no extra cost to you.
  </div>
</div>

<script>
  // ─── CHANGE THIS TO YOUR AMAZON TAG ───────────────────────────
  const TAG = 'YOUR-TAG-HERE';
  // ──────────────────────────────────────────────────────────────

  const items = [
    {
      emoji:'🐌', name:'COSRX Snail Mucin 96% Power Essence', brand:'COSRX',
      desc:'The K-beauty gateway product. 96% snail secretion filtrate floods skin with hydration and repairs your barrier — fast. 100k+ sold on Amazon every month.',
      price:'$25', asin:'B09XWS7GXN', cats:['skincare','viral'],
      badges:[{t:'#1 Bestseller',c:'b-hot'},{t:'Viral',c:'b-viral'}]
    },
    {
      emoji:'☀️', name:'Beauty of Joseon Relief Sun SPF50+', brand:'Beauty of Joseon',
      desc:'The sunscreen that converts SPF haters. Zero white cast, lightweight, no grease — and under $20. Award-winning formula perfect for everyday wear.',
      price:'$19', asin:'B09CGQXG6W', cats:['spf','skincare','under20'],
      badges:[{t:'Under $20',c:'b-fave'},{t:'Award winning',c:'b-blue'}]
    },
    {
      emoji:'🎭', name:'BIODANCE Bio-Collagen Deep Mask (4 pack)', brand:'BIODANCE',
      desc:'Hydrogel mask that melts into your skin overnight. Wake up with visibly plumper, glassier skin. TikTok obsession for very good reason.',
      price:'$28', asin:'B0B5HGZ7JF', cats:['skincare','viral'],
      badges:[{t:'TikTok viral',c:'b-viral'}]
    },
    {
      emoji:'🔬', name:'Medicube Zero Pore Pads 2.0', brand:'Medicube',
      desc:'AHA + BHA dual exfoliation in one pad. Clears congestion, shrinks pores, smooths texture. Results you can see in a week.',
      price:'$30', asin:'B0BV7YJGLF', cats:['skincare','viral'],
      badges:[{t:'Trending',c:'b-viral'},{t:'Bestseller',c:'b-hot'}]
    },
    {
      emoji:'💋', name:'LANEIGE Lip Sleeping Mask', brand:'LANEIGE',
      desc:'The lip mask that started a cult following. Sydney Sweeney swears by it. Heals dry cracked lips overnight. Great gift that always sells.',
      price:'$24', asin:'B01DBTFO98', cats:['skincare','under20'],
      badges:[{t:'Celebrity fave',c:'b-fave'}]
    },
    {
      emoji:'🧬', name:'Dr. Althea 345 Relief Cream (PDRN)', brand:'Dr. Althea',
      desc:'PDRN is the hottest K-beauty ingredient right now — stimulates collagen, reduces redness, repairs your skin barrier. Dermatologist favourite for sensitive skin.',
      price:'$32', asin:'B0CQJX9P5T', cats:['skincare'],
      badges:[{t:'2026 trend',c:'b-viral'},{t:'Sensitive skin',c:'b-blue'}]
    },
    {
      emoji:'⚡', name:'Medicube Age-R Booster Pro Device', brand:'Medicube',
      desc:'EMS + galvanic device that boosts your serum absorption by 68%. Used by Hailey Bieber and Kylie Jenner. The K-beauty device everyone is asking about.',
      price:'$149', asin:'B0BXF4GNMZ', cats:['device','viral'],
      badges:[{t:'Celebrity pick',c:'b-fave'},{t:'Device',c:'b-hot'}]
    },
    {
      emoji:'🧴', name:'COSRX Low pH Good Morning Cleanser', brand:'COSRX',
      desc:'pH-balanced cleanser that actually works with your skin instead of stripping it. The cleanser that made people rethink their whole routine.',
      price:'$14', asin:'B00MIPNBG2', cats:['skincare','under20'],
      badges:[{t:'Under $20',c:'b-fave'},{t:'Cult classic',c:'b-blue'}]
    }
  ];

  let current = 'all';

  function url(asin){ return `https://www.amazon.com/dp/${asin}?tag=${TAG}`; }

  function render(f){
    const list = f==='all' ? items : items.filter(p=>p.cats.includes(f));
    const el = document.getElementById('products');
    if(!list.length){ el.innerHTML='<div class="empty">No picks in this category yet — check back soon!</div>'; return; }
    el.innerHTML = list.map(p=>`
      <div class="card">
        <div class="card-emoji">${p.emoji}</div>
        <div class="card-body">
          <div class="badges">${p.badges.map(b=>`<span class="badge ${b.c}">${b.t}</span>`).join('')}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-brand">${p.brand}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="card-footer">
            <span class="price">${p.price}</span>
            <a class="buy" href="${url(p.asin)}" target="_blank" rel="noopener">Shop on Amazon →</a>
          </div>
        </div>
      </div>`).join('');
  }

  function filter(f, btn){
    current = f;
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render(f);
  }

  function wa(){
    const msg = encodeURIComponent('Check out these K-beauty picks — everything is on Amazon, all legit products that actually work 👉 ' + window.location.href);
    window.open('https://wa.me/?text='+msg,'_blank');
  }

  function copyLink(btn){
    navigator.clipboard.writeText(window.location.href).then(()=>{
      btn.textContent='✓ Copied!';
      setTimeout(()=>btn.textContent='Copy link', 2000);
    });
  }

  render('all');
</script>
</body>
</html>
